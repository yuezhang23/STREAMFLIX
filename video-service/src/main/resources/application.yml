server:
  port: 8082

spring:
  application:
    name: video-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/streaming_oltp?currentSchema=video}
    username: ${SPRING_DATASOURCE_USERNAME:streamflix}
    password: ${SPRING_DATASOURCE_PASSWORD:streamflix}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: true
    default-schema: ${DB_SCHEMA:video}
    schemas: ${DB_SCHEMA:video}
    create-schemas: true
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

app:
  cache:
    enabled: ${CACHE_ENABLED:true}
    ttl-seconds: 300
  traffic:
    # continuous synthetic traffic generator (simulated live users)
    enabled: ${APP_TRAFFIC_ENABLED:true}
    interval-ms: ${APP_TRAFFIC_INTERVAL_MS:5000}
    events-per-tick: ${APP_TRAFFIC_EVENTS_PER_TICK:20}
    users: ${APP_TRAFFIC_USERS:400}

youtube:
  api:
    # optional backup metadata source; blank = use the curated JSON seed verbatim
    key: ${YOUTUBE_API_KEY:}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
