server:
  port: 8081

spring:
  application:
    name: user-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/streaming_oltp?currentSchema=usr}
    username: ${SPRING_DATASOURCE_USERNAME:streamflix}
    password: ${SPRING_DATASOURCE_PASSWORD:streamflix}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: true
    # each service owns its own schema in the shared OLTP database (schema-per-service)
    default-schema: ${DB_SCHEMA:usr}
    schemas: ${DB_SCHEMA:usr}
    create-schemas: true

jwt:
  secret: ${JWT_SECRET:change-me-streamflix-super-secret-key-please-rotate-0123456789}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
