server:
  port: 8084

spring:
  application:
    name: analytics-service
  datasource:
    # OLTP — analytics owns its raw event-store table here (write-optimized, normalized)
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/streaming_oltp?currentSchema=analytics}
    username: ${SPRING_DATASOURCE_USERNAME:streamflix}
    password: ${SPRING_DATASOURCE_PASSWORD:streamflix}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: true
    default-schema: ${DB_SCHEMA:analytics}
    schemas: ${DB_SCHEMA:analytics}
    create-schemas: true
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: analytics
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.value.default.type: com.streamflix.common.event.UserBehaviorEvent
        spring.json.trusted.packages: com.streamflix.common.event
        spring.json.use.type.headers: false

olap:
  datasource:
    # OLAP — star schema for read/aggregate-heavy analytical queries (separate database)
    url: ${OLAP_DATASOURCE_URL:jdbc:postgresql://localhost:5432/streaming_olap}
    username: ${SPRING_DATASOURCE_USERNAME:streamflix}
    password: ${SPRING_DATASOURCE_PASSWORD:streamflix}

app:
  etl:
    # near-real-time for the demo; a production batch would run hourly/daily
    interval-ms: 30000

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
